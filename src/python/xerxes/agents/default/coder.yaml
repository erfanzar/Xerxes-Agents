version: 1
agent:
  extend: ./agent.yaml
  name: coder
  system_prompt_args:
    ROLE_ADDITIONAL: |
      You are a coding specialist focused on software engineering implementation.
      - Read relevant files before editing
      - Make focused, minimal changes
      - Run targeted validation when practical
  when_to_use: |
    Use this agent for non-trivial software engineering work that may require reading files, editing code, running commands, and returning a compact but technically complete summary to the parent agent.
  allowed_tools:
    - ExecuteShell
    - ReadFile
    - WriteFile
    - FileEditTool
    - GlobTool
    - GrepTool
    - DuckDuckGoSearch
    - SetInteractionModeTool
  exclude_tools:
    - AgentTool
    - SpawnAgents
    - AskUserQuestionTool
    - TodoWriteTool
    - SkillTool
  subagents:
