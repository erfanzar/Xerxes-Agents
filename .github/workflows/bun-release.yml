name: Bun Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to package
        required: true
        type: string
      publish:
        description: Attach the artifact to the GitHub release after validation
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: bun-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.12"

jobs:
  package:
    name: Build native release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Resolve and validate release identity
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          test -n "$version"
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install locked native dependencies
        run: bun install --frozen-lockfile

      - name: Verify native packages
        run: |
          bun run verify
          bun run docs:build
          git diff --exit-code -- src/typescript/dist/ui/entry.js

      - name: Package and validate the Bun distribution
        env:
          ARTIFACT_DIRECTORY: ${{ runner.temp }}/xerxes-bun-artifacts
          PACKAGE_DIRECTORY: ${{ runner.temp }}/xerxes-bun-package
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          bun run release:prepare -- --output "$PACKAGE_DIRECTORY" --expected-version "$RELEASE_VERSION"
          (
            cd "$PACKAGE_DIRECTORY"
            mkdir -p "$ARTIFACT_DIRECTORY"
            bun pm pack --filename "$ARTIFACT_DIRECTORY/xerxes-bun-${RELEASE_VERSION}.tgz" --ignore-scripts
            bun pm pack --dry-run --ignore-scripts
          )
          bun run release:check -- --package "$PACKAGE_DIRECTORY" --archive "$ARTIFACT_DIRECTORY/xerxes-bun-${RELEASE_VERSION}.tgz" --expected-version "$RELEASE_VERSION"
          bun run release:smoke -- "$ARTIFACT_DIRECTORY/xerxes-bun-${RELEASE_VERSION}.tgz"

      - name: Upload native release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xerxes-bun-${{ steps.release.outputs.version }}
          path: ${{ runner.temp }}/xerxes-bun-artifacts/xerxes-bun-${{ steps.release.outputs.version }}.tgz
          if-no-files-found: error
          retention-days: 30

  attach-github-release:
    name: Attach native artifact to GitHub release
    needs: package
    if: github.event_name == 'release' || inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download native release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: xerxes-bun-${{ needs.package.outputs.version }}
          path: artifacts

      - name: Attach native package
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          files: artifacts/xerxes-bun-${{ needs.package.outputs.version }}.tgz
          fail_on_unmatched_files: true
