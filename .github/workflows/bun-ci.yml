name: Bun CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bun-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.12"

jobs:
  native:
    name: Native Bun verification
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install locked native dependencies
        run: bun install --frozen-lockfile

      - name: Verify native packages
        run: bun run verify

      - name: Verify the committed TUI bundle is current
        run: git diff --exit-code -- src/typescript/dist/ui/entry.js

      - name: Smoke daemon RPC and completion flows
        run: bun run smoke

      - name: Build native documentation
        run: bun run docs:build

      - name: Stage and validate the native release package
        env:
          PACKAGE_DIRECTORY: ${{ runner.temp }}/xerxes-bun-package
          ARTIFACT_DIRECTORY: ${{ runner.temp }}/xerxes-bun-artifacts
        run: |
          bun run release:prepare -- --output "$PACKAGE_DIRECTORY"
          (
            cd "$PACKAGE_DIRECTORY"
            mkdir -p "$ARTIFACT_DIRECTORY"
            bun pm pack --filename "$ARTIFACT_DIRECTORY/xerxes-bun.tgz" --ignore-scripts
            bun pm pack --dry-run --ignore-scripts
          )
          bun run release:check -- --package "$PACKAGE_DIRECTORY" --archive "$ARTIFACT_DIRECTORY/xerxes-bun.tgz"
          bun run release:smoke -- "$ARTIFACT_DIRECTORY/xerxes-bun.tgz"

      - name: Validate and build the container distribution
        run: |
          XERXES_DAEMON_TOKEN=ci-compose-config-only docker compose config
          docker build --build-arg XERXES_UID="$(id -u)" -t xerxes:ci .
          docker run --rm xerxes:ci --version
          docker run --rm --entrypoint bun xerxes:ci /app/src/typescript/dist/ui/entry.js
          docker run --rm --entrypoint sh -v "$PWD:/workspace" xerxes:ci -c \
            'probe=/workspace/.xerxes-write-probe-$$; test -w /workspace && : > "$probe" && rm "$probe"'

      - name: Upload native package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xerxes-bun-package
          path: ${{ runner.temp }}/xerxes-bun-artifacts/xerxes-bun.tgz
          if-no-files-found: error
          retention-days: 14
