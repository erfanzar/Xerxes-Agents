version: '3.8'

services:
  xerxes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xerxes-app
    environment:
      - XERXES_ENV=development
      - DATABASE_URL=postgresql://xerxes:xerxes_pass@postgres:5432/xerxes_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./xerxes:/app/xerxes:ro
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xerxes-network
    ports:
      - "8000:8000"

  postgres:
    image: postgres:15-alpine
    container_name: xerxes-postgres
    environment:
      - POSTGRES_USER=xerxes
      - POSTGRES_PASSWORD=xerxes_pass
      - POSTGRES_DB=xerxes_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xerxes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xerxes-network
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: xerxes-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xerxes-network
    ports:
      - "6379:6379"

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: xerxes-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - xerxes-network
    ports:
      - "9090:9090"

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: xerxes-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - xerxes-network
    ports:
      - "3000:3000"

  # Optional: Jupyter for development
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xerxes-jupyter
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - DATABASE_URL=postgresql://xerxes:xerxes_pass@postgres:5432/xerxes_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./notebooks:/app/notebooks
      - ./xerxes:/app/xerxes:ro
      - ./data:/app/data
    networks:
      - xerxes-network
    ports:
      - "8888:8888"

networks:
  xerxes-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: