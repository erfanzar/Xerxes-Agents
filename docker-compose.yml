services:
  xerxes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        XERXES_UID: "${XERXES_UID:-1000}"
    environment:
      XERXES_DAEMON_HOST: 0.0.0.0
      XERXES_DAEMON_PORT: "11996"
      XERXES_DAEMON_TOKEN: "${XERXES_DAEMON_TOKEN:?Set XERXES_DAEMON_TOKEN to a strong random value}"
      XERXES_ENV: production
      XERXES_HOME: /home/xerxes/.xerxes
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["daemon", "--project-dir", "/workspace"]
    volumes:
      - xerxes_home:/home/xerxes/.xerxes
      - ./:/workspace
    ports:
      - "127.0.0.1:11996:11996"

volumes:
  xerxes_home:
